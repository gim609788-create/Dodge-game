<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☄ DODGE GAME</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a1a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; font-family:'Segoe UI',sans-serif; color:#fff; overflow:hidden;
}
#muteBtn {
  position:fixed; top:14px; right:18px;
  background:transparent; border:1px solid #ffffff33; color:#aaa;
  font-size:1.2rem; padding:6px 12px; border-radius:8px; cursor:pointer;
}
#muteBtn:hover { border-color:#00e5ff88; color:#00e5ff; }

h1 { font-size:2rem; letter-spacing:4px; margin-bottom:8px; color:#00e5ff; text-shadow:0 0 20px #00e5ff88; }

#scoreBoard {
  display:flex; gap:30px; margin-bottom:12px;
  font-size:0.95rem; letter-spacing:2px;
}
#scoreBoard span { color:#aaa; }
#scoreBoard b { color:#fff; font-size:1.1rem; }

#coinBar {
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px; font-size:1rem; color:#ffd700;
}
#coinBar span { font-size:1.3rem; }

#gameWrapper { position:relative; }
canvas {
  display:block; border:2px solid #00e5ff44; border-radius:12px;
  box-shadow:0 0 40px #00e5ff22; background:#0d0d2b;
}

/* OVERLAY */
#overlay {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  background:rgba(10,10,26,0.93); border-radius:12px;
  padding:16px 12px; overflow-y:auto; gap:0;
}

.ov-title { font-size:1.6rem; color:#00e5ff; text-shadow:0 0 16px #00e5ff; letter-spacing:3px; margin-bottom:6px; }
.ov-sub { color:#aaa; font-size:0.82rem; margin-bottom:10px; letter-spacing:1px; }

/* TABS */
.tabs { display:flex; gap:6px; margin-bottom:12px; }
.tab {
  padding:6px 16px; border-radius:20px; font-size:0.82rem;
  cursor:pointer; border:1px solid #ffffff33; color:#aaa; background:transparent;
  transition:all 0.2s; letter-spacing:1px;
}
.tab.active { border-color:#00e5ff; color:#00e5ff; background:#00e5ff11; }

.panel { display:none; width:100%; }
.panel.active { display:block; }

/* 캐릭터/테마 그리드 */
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:10px; width:100%; }
.card {
  border:2px solid #ffffff22; border-radius:12px; padding:10px 8px;
  cursor:pointer; text-align:center; background:#ffffff08; transition:all 0.2s;
  position:relative; display:flex; flex-direction:column; align-items:center;
}
.card:hover { border-color:#00e5ff66; background:#00e5ff11; }
.card.selected { border-color:#00e5ff; background:#00e5ff22; box-shadow:0 0 12px #00e5ff44; }
.card.locked { opacity:0.6; cursor:default; }
.card canvas { border-radius:8px; background:#ffffff08; width:100% !important; height:auto !important; }
.card-name { font-size:0.85rem; color:#fff; margin-top:6px; letter-spacing:1px; font-weight:bold; }
.card-cost { font-size:0.75rem; color:#ffd700; margin-top:3px; }
.lock-icon { position:absolute; top:6px; right:8px; font-size:1rem; }
.selected-badge { position:absolute; top:6px; left:8px; font-size:0.65rem; background:#00e5ff; color:#000; padding:2px 6px; border-radius:10px; font-weight:bold; }

/* 랭킹 */
.rank-list { width:100%; }
.rank-row {
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-bottom:1px solid #ffffff11;
  font-size:0.85rem;
}
.rank-num { width:24px; color:#aaa; font-weight:bold; }
.rank-num.gold { color:#ffd700; }
.rank-num.silver { color:#c0c0c0; }
.rank-num.bronze { color:#cd7f32; }
.rank-name { flex:1; color:#fff; }
.rank-score { color:#00e5ff; font-weight:bold; }
.rank-empty { color:#555; font-size:0.82rem; text-align:center; padding:20px; }

/* 버튼 */
.btn {
  padding:10px 30px; background:transparent;
  border:2px solid #00e5ff; color:#00e5ff;
  font-size:0.95rem; letter-spacing:3px; border-radius:8px;
  cursor:pointer; transition:all 0.2s; margin-top:8px;
}
.btn:hover { background:#00e5ff22; box-shadow:0 0 20px #00e5ff66; }
.btn-buy {
  padding:5px 12px; border:1px solid #ffd700; color:#ffd700;
  background:transparent; border-radius:6px; font-size:0.72rem;
  cursor:pointer; margin-top:4px; transition:all 0.2s;
}
.btn-buy:hover { background:#ffd70022; }

#hint { margin-top:8px; font-size:0.72rem; color:#555; letter-spacing:1px; }

/* 게임오버 패널 */
#goPanel {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  padding:20px;
}
</style>
</head>
<body>

<button id="muteBtn">🔊</button>
<h1>☄ DODGE</h1>

<div id="scoreBoard">
  <div><span>SCORE </span><b id="scoreTxt">0</b></div>
  <div><span>BEST </span><b id="bestTxt">0</b></div>
  <div><span>LEVEL </span><b id="levelTxt">1</b></div>
</div>
<div id="coinBar"><span>🪙</span><b id="coinTxt">0</b> 코인</div>

<div id="gameWrapper">
  <canvas id="c" width="480" height="520"></canvas>
  <div id="overlay">
    <!-- 메인 메뉴 -->
    <div id="menuPanel">
      <div class="ov-title">☄ DODGE</div>
      <div class="ov-sub">장애물을 피해 최고 점수를 노려라!</div>
      <div class="tabs">
        <button class="tab active" onclick="showTab('play')">▶ 플레이</button>
        <button class="tab" onclick="showTab('skin')">👤 스킨</button>
        <button class="tab" onclick="showTab('theme')">🌍 테마</button>
        <button class="tab" onclick="showTab('rank')">🏆 랭킹</button>
      </div>

      <!-- 플레이 탭 -->
      <div class="panel active" id="tab-play">
        <button class="btn" id="startBtn" style="width:100%;margin-bottom:8px">START</button>
        <button class="btn" id="hardBtn" style="width:100%;border-color:#ff4444;color:#ff4444;margin-bottom:8px">💀 하드모드</button>
        <div id="hint">← → 방향키 / 마우스로 조작</div>
      </div>

      <!-- 스킨 탭 -->
      <div class="panel" id="tab-skin">
        <div class="grid" id="skinGrid"></div>
      </div>

      <!-- 테마 탭 -->
      <div class="panel" id="tab-theme">
        <div class="grid" id="themeGrid"></div>
      </div>

      <!-- 랭킹 탭 -->
      <div class="panel" id="tab-rank">
        <div class="rank-list" id="rankList"></div>
        <button class="btn" onclick="clearRank()" style="border-color:#ff4444;color:#ff4444;font-size:0.75rem;padding:6px 16px;margin-top:10px">초기화</button>
      </div>
    </div>

    <!-- 게임오버 패널 -->
    <div id="goPanel" style="display:none">
      <div class="ov-title">💀 GAME OVER</div>
      <div style="font-size:1.4rem">점수: <b id="goScore" style="color:#00e5ff;font-size:1.8rem">0</b></div>
      <div style="color:#ffd700">🪙 +<b id="goCoin">0</b> 코인 획득!</div>
      <div style="color:#aaa;font-size:0.85rem">최고기록: <b id="goBest">0</b></div>
      <input id="nameInput" placeholder="닉네임 입력 (랭킹 등록)" maxlength="10"
        style="padding:8px 12px;border-radius:8px;border:1px solid #00e5ff44;background:#ffffff11;color:#fff;font-size:0.9rem;width:200px;text-align:center;margin-top:4px">
      <button class="btn" onclick="registerRank()" style="padding:8px 20px;font-size:0.85rem">랭킹 등록</button>
      <button class="btn" onclick="backToMenu()" style="border-color:#aaa;color:#aaa;padding:8px 20px;font-size:0.85rem">메뉴로</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── 저장 데이터 ───────────────────────────────────
let coins = parseInt(localStorage.getItem('dg_coins')||'0');
let best = parseInt(localStorage.getItem('dg_best')||'0');
let ownedSkins = JSON.parse(localStorage.getItem('dg_skins')||'["default"]');
let ownedThemes = JSON.parse(localStorage.getItem('dg_themes')||'["space"]');
let selSkin = localStorage.getItem('dg_selSkin')||'default';
let selTheme = localStorage.getItem('dg_selTheme')||'space';
let rankings = JSON.parse(localStorage.getItem('dg_rank')||'[]');

function save() {
  localStorage.setItem('dg_coins', coins);
  localStorage.setItem('dg_best', best);
  localStorage.setItem('dg_skins', JSON.stringify(ownedSkins));
  localStorage.setItem('dg_themes', JSON.stringify(ownedThemes));
  localStorage.setItem('dg_selSkin', selSkin);
  localStorage.setItem('dg_selTheme', selTheme);
  localStorage.setItem('dg_rank', JSON.stringify(rankings));
}

// ── 스킨 데이터 ───────────────────────────────────
const SKINS = [
  { id:'default', name:'기본', cost:0, color:'#00e5ff', bodyColor:'#ffffff', eyeColor:'#0d0d2b' },
  { id:'fire', name:'파이어', cost:100, color:'#ff6600', bodyColor:'#ffcc00', eyeColor:'#ff0000' },
  { id:'ghost', name:'고스트', cost:150, color:'#aaaaff', bodyColor:'#ddddff', eyeColor:'#330066' },
  { id:'robot', name:'로봇', cost:200, color:'#aaaaaa', bodyColor:'#cccccc', eyeColor:'#00ff88' },
  { id:'ninja', name:'닌자', cost:250, color:'#222222', bodyColor:'#444444', eyeColor:'#ff0000' },
  { id:'angel', name:'천사', cost:300, color:'#ffe066', bodyColor:'#fff8dc', eyeColor:'#4444ff' },
];

// ── 테마 데이터 ───────────────────────────────────
const THEMES = [
  { id:'space', name:'우주', cost:0, bg:'#0d0d2b', accent:'#00e5ff', obColors:['#ff4d4d','#ff9f00','#ff4dff','#ffdd00','#4dffb4'] },
  { id:'forest', name:'숲', cost:200, bg:'#0d1a0d', accent:'#44ff88', obColors:['#8B4513','#228B22','#556B2F','#006400','#32CD32'] },
  { id:'city', name:'도시', cost:200, bg:'#1a1a2e', accent:'#ff9900', obColors:['#ff6600','#ffcc00','#ff3300','#cc0000','#ff9900'] },
];

// ── UI 함수 ───────────────────────────────────────
document.getElementById('bestTxt').textContent = best;
document.getElementById('coinTxt').textContent = coins;

function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
  if (name==='skin') renderSkinGrid();
  if (name==='theme') renderThemeGrid();
  if (name==='rank') renderRankList();
}

// 스킨 미리보기 캔버스
function drawSkinPreview(cv, skin) {
  const c = cv.getContext('2d');
  c.clearRect(0,0,cv.width,cv.height);
  // 배경 그라데이션
  const grad = c.createRadialGradient(cv.width/2,cv.height/2,0,cv.width/2,cv.height/2,cv.width/2);
  grad.addColorStop(0, skin.color+'22'); grad.addColorStop(1, '#00000000');
  c.fillStyle=grad; c.fillRect(0,0,cv.width,cv.height);

  const cx=cv.width/2, w=50, h=80;
  const x=cx-w/2, y=8;
  const headR=w*0.28, bodyTop=y+headR*2+4, bodyH=h*0.32, legLen=h*0.26, armLen=w*0.4;
  c.shadowColor=skin.color; c.shadowBlur=14;
  c.strokeStyle=skin.color; c.lineWidth=4; c.lineCap='round';
  // 다리
  c.beginPath(); c.moveTo(cx-4,bodyTop+bodyH); c.lineTo(cx-11,bodyTop+bodyH+legLen); c.stroke();
  c.beginPath(); c.moveTo(cx+4,bodyTop+bodyH); c.lineTo(cx+11,bodyTop+bodyH+legLen); c.stroke();
  // 몸통
  c.strokeStyle=skin.bodyColor; c.lineWidth=6;
  c.beginPath(); c.moveTo(cx,bodyTop); c.lineTo(cx,bodyTop+bodyH); c.stroke();
  // 팔
  c.strokeStyle=skin.color; c.lineWidth=4;
  c.beginPath(); c.moveTo(cx,bodyTop+bodyH*0.3); c.lineTo(cx-armLen,bodyTop+bodyH*0.7); c.stroke();
  c.beginPath(); c.moveTo(cx,bodyTop+bodyH*0.3); c.lineTo(cx+armLen,bodyTop+bodyH*0.7); c.stroke();
  // 머리
  c.fillStyle=skin.bodyColor; c.shadowBlur=14;
  c.beginPath(); c.arc(cx,y+headR,headR,0,Math.PI*2); c.fill();
  // 눈
  c.fillStyle=skin.eyeColor; c.shadowBlur=0;
  c.beginPath();
  c.arc(cx-headR*0.32,y+headR-2,3,0,Math.PI*2);
  c.arc(cx+headR*0.32,y+headR-2,3,0,Math.PI*2);
  c.fill();
  // 입 (미소)
  c.strokeStyle=skin.eyeColor; c.lineWidth=2;
  c.beginPath(); c.arc(cx,y+headR+2,headR*0.35,0.2,Math.PI-0.2); c.stroke();
}

function renderSkinGrid() {
  const grid = document.getElementById('skinGrid');
  grid.innerHTML = '';
  SKINS.forEach(sk => {
    const owned = ownedSkins.includes(sk.id);
    const selected = selSkin === sk.id;
    const div = document.createElement('div');
    div.className = 'card' + (selected?' selected':'') + (!owned?' locked':'');
    if (selected) div.innerHTML += `<span class="selected-badge">✔ 사용중</span>`;
    if (!owned) div.innerHTML += `<span class="lock-icon">🔒</span>`;
    const cv = document.createElement('canvas');
    cv.width=120; cv.height=110;
    div.appendChild(cv);
    drawSkinPreview(cv, sk);
    const nm = document.createElement('div'); nm.className='card-name'; nm.textContent=sk.name; div.appendChild(nm);
    if (!owned) {
      const cost = document.createElement('div'); cost.className='card-cost'; cost.textContent=`🪙 ${sk.cost} 코인`; div.appendChild(cost);
      const btn = document.createElement('button');
      btn.className='btn-buy'; btn.textContent='구매하기';
      btn.onclick = (e) => { e.stopPropagation(); buySkin(sk); };
      div.appendChild(btn);
    } else {
      div.onclick = () => { selSkin=sk.id; save(); renderSkinGrid(); };
    }
    grid.appendChild(div);
  });
}

function buySkin(sk) {
  if (coins < sk.cost) { alert('코인이 부족해요! 🪙'); return; }
  coins -= sk.cost;
  ownedSkins.push(sk.id);
  document.getElementById('coinTxt').textContent = coins;
  save(); renderSkinGrid();
}

// 테마 미리보기
function drawThemePreview(cv, theme) {
  const c = cv.getContext('2d');
  const W=cv.width, H=cv.height;
  c.fillStyle = theme.bg; c.fillRect(0,0,W,H);

  if (theme.id === 'space') {
    // 별 여러개
    c.fillStyle='#ffffff99';
    [[10,12],[35,8],[55,20],[20,35],[45,30],[62,10],[8,40],[50,45]].forEach(([x,y])=>{
      c.beginPath(); c.arc(x,y,Math.random()*2+1,0,Math.PI*2); c.fill();
    });
    // 행성
    c.fillStyle='#4466ff88'; c.beginPath(); c.arc(W-18,18,12,0,Math.PI*2); c.fill();
    c.strokeStyle='#aaaaff66'; c.lineWidth=3;
    c.beginPath(); c.ellipse(W-18,18,20,6,0.4,0,Math.PI*2); c.stroke();
    // 운석 장애물
    c.fillStyle=theme.obColors[0]+'ee'; c.shadowColor=theme.obColors[0]; c.shadowBlur=8;
    c.beginPath(); c.arc(W/2,H/2,10,0,Math.PI*2); c.fill();
    c.fillStyle=theme.obColors[1]+'ee'; c.shadowColor=theme.obColors[1];
    c.beginPath(); c.arc(18,H-20,7,0,Math.PI*2); c.fill();
    c.shadowBlur=0;

  } else if (theme.id === 'forest') {
    // 하늘
    const grad=c.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0d2b0d'); grad.addColorStop(1,'#1a3d1a');
    c.fillStyle=grad; c.fillRect(0,0,W,H);
    // 달
    c.fillStyle='#ffffcc99'; c.beginPath(); c.arc(W-15,12,10,0,Math.PI*2); c.fill();
    // 나무들
    [[12,H],[W/2,H],[W-12,H]].forEach(([tx,ty])=>{
      c.fillStyle='#4a2f1a'; c.fillRect(tx-4,ty-25,8,25);
      c.fillStyle='#228B22cc'; c.beginPath(); c.arc(tx,ty-28,14,0,Math.PI*2); c.fill();
    });
    // 장애물
    c.fillStyle=theme.obColors[0]+'ee'; c.shadowColor=theme.obColors[0]; c.shadowBlur=6;
    c.beginPath(); c.arc(W/2,H/2-5,8,0,Math.PI*2); c.fill(); c.shadowBlur=0;

  } else if (theme.id === 'city') {
    // 빌딩
    [[0,50],[18,35],[36,55],[54,30]].forEach(([bx,bh])=>{
      c.fillStyle='#1a1a3a'; c.fillRect(bx,H-bh,16,bh);
      c.fillStyle='#ffff0044';
      for(let r=0;r<3;r++) for(let col=0;col<2;col++)
        c.fillRect(bx+col*7+2,H-bh+r*14+5,5,8);
    });
    // 불빛
    ['#ff9900','#ffff00','#ffffff'].forEach((col,i)=>{
      c.fillStyle=col+'99'; c.beginPath(); c.arc(10+i*25,10+i*5,2,0,Math.PI*2); c.fill();
    });
    // 장애물
    c.fillStyle=theme.obColors[0]+'ee'; c.shadowColor=theme.obColors[0]; c.shadowBlur=6;
    c.beginPath(); c.arc(W/2,H/2-5,8,0,Math.PI*2); c.fill(); c.shadowBlur=0;
  }
}

function renderThemeGrid() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  // 테마는 3개라 한 줄에 1개씩 더 잘 보이게
  grid.style.gridTemplateColumns = 'repeat(1,1fr)';
  THEMES.forEach(th => {
    const owned = ownedThemes.includes(th.id);
    const selected = selTheme === th.id;
    const div = document.createElement('div');
    div.className = 'card' + (selected?' selected':'') + (!owned?' locked':'');
    div.style.flexDirection='row'; div.style.gap='12px'; div.style.alignItems='center'; div.style.padding='10px 12px';
    if (selected) div.innerHTML += `<span class="selected-badge">✔ 사용중</span>`;
    if (!owned) div.innerHTML += `<span class="lock-icon">🔒</span>`;
    const cv = document.createElement('canvas');
    cv.width=80; cv.height=60; cv.style.minWidth='80px'; cv.style.borderRadius='8px';
    div.appendChild(cv);
    drawThemePreview(cv, th);
    const info = document.createElement('div'); info.style.textAlign='left';
    const nm = document.createElement('div'); nm.className='card-name'; nm.style.fontSize='1rem'; nm.textContent=th.name; info.appendChild(nm);
    const desc = document.createElement('div'); desc.style.cssText='font-size:0.72rem;color:#aaa;margin-top:3px';
    desc.textContent = th.id==='space'?'🌌 별, 행성, 운석':th.id==='forest'?'🌲 나무, 달, 잎사귀':'🏙 빌딩, 불빛, 도시';
    info.appendChild(desc);
    if (!owned) {
      const cost = document.createElement('div'); cost.className='card-cost'; cost.style.marginTop='5px'; cost.textContent=`🪙 ${th.cost} 코인`; info.appendChild(cost);
      const btn = document.createElement('button'); btn.className='btn-buy'; btn.textContent='구매하기';
      btn.onclick = (e) => { e.stopPropagation(); buyTheme(th); }; info.appendChild(btn);
    }
    div.appendChild(info);
    if (owned) div.onclick = () => { selTheme=th.id; save(); renderThemeGrid(); };
    grid.appendChild(div);
  });
}

function buyTheme(th) {
  if (coins < th.cost) { alert('코인이 부족해요! 🪙'); return; }
  coins -= th.cost;
  ownedThemes.push(th.id);
  document.getElementById('coinTxt').textContent = coins;
  save(); renderThemeGrid();
}

// 랭킹
function renderRankList() {
  const list = document.getElementById('rankList');
  list.innerHTML = '';
  const sorted = [...rankings].sort((a,b)=>b.score-a.score).slice(0,10);
  if (sorted.length===0) {
    list.innerHTML='<div class="rank-empty">아직 기록이 없어요!<br>게임을 플레이하고 등록해보세요 🎮</div>';
    return;
  }
  sorted.forEach((r,i) => {
    const div = document.createElement('div'); div.className='rank-row';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    div.innerHTML = `<div class="rank-num ${cls}">${medal}</div><div class="rank-name">${r.name}</div><div class="rank-score">${r.score}</div>`;
    list.appendChild(div);
  });
}

function clearRank() {
  if (confirm('랭킹을 초기화할까요?')) { rankings=[]; save(); renderRankList(); }
}

function registerRank() {
  const name = document.getElementById('nameInput').value.trim() || '익명';
  const score = parseInt(document.getElementById('goScore').textContent);
  rankings.push({ name, score, date: new Date().toLocaleDateString() });
  save();
  alert(`${name} 님의 점수 ${score}점이 등록됐어요! 🏆`);
  backToMenu();
}

function backToMenu() {
  document.getElementById('goPanel').style.display='none';
  document.getElementById('menuPanel').style.display='flex';
  document.getElementById('menuPanel').style.flexDirection='column';
  document.getElementById('menuPanel').style.alignItems='center';
  document.getElementById('overlay').style.display='flex';
}

// ── Web Audio ─────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
let muted = false;

function playTone(freq,type,dur,vol,st) {
  if(muted)return;
  const t=st||AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur);
}
function playDodge(){ playTone(440,'triangle',0.06,0.08); }
function playLevelUp(){ const t=AC.currentTime; [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.15,0.2,t+i*0.08)); }
function playGameOver(){ const t=AC.currentTime; [400,300,200,150].forEach((f,i)=>playTone(f,'sawtooth',0.2,0.25,t+i*0.1)); }
function playNearMiss(){ playTone(880,'sine',0.08,0.12); }

let beatInterval=null, beatStep=0;
const BEAT=[1,0,0,1,0,1,0,0];
function startBeat(){ 
  if(beatInterval)clearInterval(beatInterval);
  beatStep=0;
  beatInterval=setInterval(()=>{
    if(!gameRunning){clearInterval(beatInterval);return;}
    if(BEAT[beatStep%BEAT.length]){
      if(!muted){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';const t=AC.currentTime;o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.15);}
    }
    beatStep++;
  }, (60/130/2)*1000);
}
function stopBeat(){ if(beatInterval){clearInterval(beatInterval);beatInterval=null;} }

document.getElementById('muteBtn').onclick=()=>{ muted=!muted; document.getElementById('muteBtn').textContent=muted?'🔇':'🔊'; };

// ── 게임 변수 ─────────────────────────────────────
let player,obstacles,score,gameRunning,animId,level,spawnTimer,hardMode,prevLevel;
let keys={}, mouseX=null;

// ── 배경 시스템 ───────────────────────────────────
let bgElements=[];

function initBgElements() {
  bgElements=[];
  const theme = THEMES.find(t=>t.id===selTheme);
  if(selTheme==='space') {
    for(let i=0;i<60;i++) bgElements.push({type:'star',x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,speed:Math.random()*0.4+0.1});
  } else if(selTheme==='forest') {
    for(let i=0;i<20;i++) bgElements.push({type:'leaf',x:Math.random()*W,y:Math.random()*H,size:Math.random()*8+4,speed:Math.random()*0.5+0.2,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.05});
  } else if(selTheme==='city') {
    // 빌딩들
    for(let i=0;i<8;i++) bgElements.push({type:'building',x:i*(W/8),w:W/8-4,h:60+Math.random()*80,color:`hsl(220,20%,${15+Math.random()*10}%)`});
    // 별(도시 불빛)
    for(let i=0;i<30;i++) bgElements.push({type:'light',x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.5,speed:Math.random()*1+0.5,color:['#ff9900','#ffff00','#ffffff'][Math.floor(Math.random()*3)]});
  }
}

function drawBg() {
  const theme = THEMES.find(t=>t.id===selTheme);
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=theme.bg; ctx.fillRect(0,0,W,H);

  if(selTheme==='space') {
    ctx.fillStyle='#ffffff22';
    for(let s of bgElements) {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      s.y+=s.speed; if(s.y>H){s.y=0;s.x=Math.random()*W;}
    }
  } else if(selTheme==='forest') {
    // 그라데이션 하늘
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0d2b0d'); grad.addColorStop(1,'#1a3d1a');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    // 달
    ctx.fillStyle='#ffffcc44'; ctx.beginPath(); ctx.arc(W-60,50,30,0,Math.PI*2); ctx.fill();
    // 잎사귀
    ctx.fillStyle='#44ff8866';
    for(let l of bgElements) {
      ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(l.rot);
      ctx.beginPath(); ctx.ellipse(0,0,l.size,l.size/2,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
      l.y+=l.speed; l.rot+=l.rotSpeed; l.x+=Math.sin(l.rot)*0.5;
      if(l.y>H+20){l.y=-20;l.x=Math.random()*W;}
    }
  } else if(selTheme==='city') {
    // 빌딩 배경
    for(let b of bgElements.filter(e=>e.type==='building')) {
      ctx.fillStyle=b.color; ctx.fillRect(b.x,H-b.h,b.w,b.h);
      // 창문
      ctx.fillStyle='#ffff0033';
      for(let r=0;r<Math.floor(b.h/20);r++)
        for(let c=0;c<Math.floor(b.w/14);c++)
          if(Math.random()>0.3) ctx.fillRect(b.x+c*14+4,H-b.h+r*20+5,7,10);
    }
    // 도시 불빛
    for(let l of bgElements.filter(e=>e.type==='light')) {
      ctx.fillStyle=l.color+'88'; ctx.beginPath(); ctx.arc(l.x,l.y,l.r,0,Math.PI*2); ctx.fill();
      l.y+=l.speed; if(l.y>H){l.y=0;l.x=Math.random()*W;}
    }
  }
}

// ── 캐릭터 그리기 ─────────────────────────────────
function drawPlayer(x,y,w,h,hit) {
  const skin = SKINS.find(s=>s.id===selSkin)||SKINS[0];
  const col=hit?'#ff4444':skin.color, bodyCol=hit?'#ff6666':skin.bodyColor;
  ctx.save();
  const cx=x+w/2, headR=w*0.28, bodyTop=y+headR*2+4, bodyH=h*0.32, legLen=h*0.24, armLen=w*0.38;
  ctx.shadowColor=col; ctx.shadowBlur=18;
  ctx.strokeStyle=col; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-4,bodyTop+bodyH); ctx.lineTo(cx-10,bodyTop+bodyH+legLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+4,bodyTop+bodyH); ctx.lineTo(cx+10,bodyTop+bodyH+legLen); ctx.stroke();
  ctx.strokeStyle=bodyCol; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(cx,bodyTop); ctx.lineTo(cx,bodyTop+bodyH); ctx.stroke();
  ctx.strokeStyle=col; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(cx,bodyTop+bodyH*0.3); ctx.lineTo(cx-armLen,bodyTop+bodyH*0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,bodyTop+bodyH*0.3); ctx.lineTo(cx+armLen,bodyTop+bodyH*0.7); ctx.stroke();
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.arc(cx,y+headR,headR,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=skin.eyeColor; ctx.shadowBlur=0;
  ctx.beginPath();
  ctx.arc(cx-headR*0.3,y+headR-2,3,0,Math.PI*2);
  ctx.arc(cx+headR*0.3,y+headR-2,3,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ── 장애물 ────────────────────────────────────────
function drawObstacle(ob) {
  ctx.save();
  ctx.shadowColor=ob.color; ctx.shadowBlur=14; ctx.fillStyle=ob.color;
  if(ob.shape===0) {
    ctx.translate(ob.x+ob.w/2,ob.y+ob.h/2); ctx.rotate(ob.rot);
    drawStar(0,0,5,ob.w/2,ob.w/4);
  } else if(ob.shape===1) {
    const cx=ob.x+ob.w/2,cy=ob.y+ob.h/2;
    ctx.beginPath(); ctx.moveTo(cx,ob.y); ctx.lineTo(ob.x+ob.w,cy); ctx.lineTo(cx,ob.y+ob.h); ctx.lineTo(ob.x,cy); ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(ob.x+ob.w/2,ob.y+ob.h/2,ob.w/2,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawStar(cx,cy,sp,oR,iR) {
  let rot=(Math.PI/2)*3,step=Math.PI/sp;
  ctx.beginPath(); ctx.moveTo(cx,cy-oR);
  for(let i=0;i<sp;i++){ctx.lineTo(cx+Math.cos(rot)*oR,cy+Math.sin(rot)*oR);rot+=step;ctx.lineTo(cx+Math.cos(rot)*iR,cy+Math.sin(rot)*iR);rot+=step;}
  ctx.lineTo(cx,cy-oR); ctx.closePath(); ctx.fill();
}

function collides(a,b){const m=6;return!(a.x+m>b.x+b.w-m||a.x+a.w-m<b.x+m||a.y+m>b.y+b.h-m||a.y+a.h-m<b.y+m);}
function isNear(a,b){const m=20;return!(a.x+m>b.x+b.w-m||a.x+a.w-m<b.x+m||a.y+m>b.y+b.h-m||a.y+a.h-m<b.y+m);}

// ── 게임 초기화 ───────────────────────────────────
function initGame(hard) {
  hardMode=hard; score=0; level=1; spawnTimer=0; prevLevel=1;
  player={x:W/2-20,y:H-90,w:40,h:70,speed:hard?6:5,hit:false,hitTimer:0};
  obstacles=[];
  initBgElements();
  document.getElementById('scoreTxt').textContent=0;
  document.getElementById('levelTxt').textContent=1;
}

function spawnObstacle() {
  const theme=THEMES.find(t=>t.id===selTheme);
  const sz=20+Math.random()*22;
  obstacles.push({
    x:Math.random()*(W-sz),y:-sz,w:sz,h:sz,
    speed:(hardMode?2.5:1.5)+level*0.4+Math.random()*1.0,
    shape:Math.floor(Math.random()*3),
    color:theme.obColors[Math.floor(Math.random()*theme.obColors.length)],
    rot:0,rotSpeed:(Math.random()-0.5)*0.12,passed:false
  });
}

// ── 메인 루프 ─────────────────────────────────────
function gameLoop() {
  if(!gameRunning)return;
  drawBg();

  if(keys['ArrowLeft']||keys['a']) player.x-=player.speed;
  if(keys['ArrowRight']||keys['d']) player.x+=player.speed;
  if(mouseX!==null){const dx=mouseX-player.w/2-player.x;if(Math.abs(dx)>2)player.x+=dx*0.13;}
  player.x=Math.max(0,Math.min(W-player.w,player.x));

  score++;
  const ds=Math.floor(score/10);
  document.getElementById('scoreTxt').textContent=ds;
  level=Math.floor(score/800)+1;
  if(level!==prevLevel){document.getElementById('levelTxt').textContent=level;playLevelUp();prevLevel=level;}

  spawnTimer++;
  const si=Math.max(hardMode?25:35,100-level*7);
  if(spawnTimer>=si){spawnTimer=0;spawnObstacle();if(level>4)spawnObstacle();}

  for(let i=obstacles.length-1;i>=0;i--){
    const ob=obstacles[i]; ob.y+=ob.speed; ob.rot+=ob.rotSpeed;
    drawObstacle(ob);
    if(ob.y>H+50){obstacles.splice(i,1);continue;}
    if(collides(player,ob)){endGame();return;}
    if(!ob.passed&&isNear(player,ob)&&!collides(player,ob)) playNearMiss();
    if(!ob.passed&&ob.y>player.y+player.h){ob.passed=true;playDodge();}
  }

  if(player.hitTimer>0){player.hit=true;player.hitTimer--;}else{player.hit=false;}
  drawPlayer(player.x,player.y,player.w,player.h,player.hit);

  // 하드모드 표시
  if(hardMode){
    ctx.fillStyle='#ff444444'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444'; ctx.font='bold 11px sans-serif'; ctx.textAlign='right';
    ctx.fillText('💀 HARD MODE',W-10,20); ctx.textAlign='left';
  }

  // 레벨바
  const theme=THEMES.find(t=>t.id===selTheme);
  const barW=(W-40)*Math.min((score%800)/800,1);
  ctx.fillStyle=theme.accent+'33'; ctx.fillRect(20,H-12,W-40,6);
  ctx.fillStyle=theme.accent; ctx.shadowColor=theme.accent; ctx.shadowBlur=8;
  ctx.fillRect(20,H-12,barW,6); ctx.shadowBlur=0;

  animId=requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning=false; cancelAnimationFrame(animId); stopBeat(); playGameOver();
  const finalScore=Math.floor(score/10);
  const earned=Math.floor(finalScore/5)+(hardMode?Math.floor(finalScore/3):0);
  coins+=earned;
  if(finalScore>best){best=finalScore;localStorage.setItem('dg_best',best);document.getElementById('bestTxt').textContent=best;}
  document.getElementById('coinTxt').textContent=coins;
  save();

  document.getElementById('goScore').textContent=finalScore;
  document.getElementById('goCoin').textContent=earned;
  document.getElementById('goBest').textContent=best;
  document.getElementById('nameInput').value='';

  document.getElementById('menuPanel').style.display='none';
  document.getElementById('goPanel').style.display='flex';
  document.getElementById('overlay').style.display='flex';
}

function startGame(hard) {
  AC.resume();
  document.getElementById('overlay').style.display='none';
  initGame(hard); gameRunning=true; startBeat(); gameLoop();
}

document.getElementById('startBtn').onclick=()=>startGame(false);
document.getElementById('hardBtn').onclick=()=>startGame(true);

document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;});
canvas.addEventListener('mouseleave',()=>{mouseX=null;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;},{passive:false});
canvas.addEventListener('touchend',()=>{mouseX=null;});

// 초기 배경
initBgElements(); drawBg();
</script>
</body>
