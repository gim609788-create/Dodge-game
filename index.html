<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피하기 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 10px;
    color: #00e5ff;
    text-shadow: 0 0 20px #00e5ff88;
  }
  #scoreBoard {
    display: flex;
    gap: 40px;
    margin-bottom: 14px;
    font-size: 1rem;
    letter-spacing: 2px;
  }
  #scoreBoard span { color: #aaa; }
  #scoreBoard b { color: #fff; font-size: 1.2rem; }
  #gameWrapper { position: relative; }
  canvas {
    display: block;
    border: 2px solid #00e5ff44;
    border-radius: 12px;
    box-shadow: 0 0 40px #00e5ff22, 0 0 80px #00e5ff11;
    background: #0d0d2b;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,26,0.85);
    border-radius: 12px;
    gap: 16px;
  }
  #overlay h2 {
    font-size: 2rem;
    color: #00e5ff;
    text-shadow: 0 0 16px #00e5ff;
    letter-spacing: 3px;
  }
  #overlay p {
    color: #aaa;
    font-size: 1rem;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.7;
  }
  button {
    margin-top: 8px;
    padding: 12px 36px;
    background: transparent;
    border: 2px solid #00e5ff;
    color: #00e5ff;
    font-size: 1rem;
    letter-spacing: 3px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: #00e5ff22; box-shadow: 0 0 20px #00e5ff66; }
  #hint { margin-top: 10px; font-size: 0.78rem; color: #555; letter-spacing: 1px; }
  #muteBtn {
    position: fixed;
    top: 14px; right: 18px;
    background: transparent;
    border: 1px solid #ffffff33;
    color: #aaa;
    font-size: 1.2rem;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0;
    margin: 0;
  }
  #muteBtn:hover { border-color: #00e5ff88; color: #00e5ff; }
</style>
</head>
<body>

<button id="muteBtn">🔊</button>
<h1>☄ DODGE</h1>

<div id="scoreBoard">
  <div><span>SCORE </span><b id="scoreTxt">0</b></div>
  <div><span>BEST </span><b id="bestTxt">0</b></div>
  <div><span>LEVEL </span><b id="levelTxt">1</b></div>
</div>

<div id="gameWrapper">
  <canvas id="c" width="480" height="520"></canvas>
  <div id="overlay">
    <h2>☄ DODGE</h2>
    <p>마우스 또는 방향키로 캐릭터를 움직여<br>떨어지는 장애물을 피하세요!</p>
    <button id="startBtn">START</button>
    <div id="hint">← → 방향키 / 마우스로 조작</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreTxt = document.getElementById('scoreTxt');
const bestTxt = document.getElementById('bestTxt');
const levelTxt = document.getElementById('levelTxt');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
let player, obstacles, score, best, gameRunning, animId, level, spawnTimer;
let keys = {}, mouseX = null;
let muted = false;

best = parseInt(localStorage.getItem('dodge_best') || '0');
bestTxt.textContent = best;

// ── Web Audio 사운드 ──────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, vol, startTime) {
  if (muted) return;
  const t = startTime || AC.currentTime;
  const osc = AC.createOscillator();
  const gain = AC.createGain();
  osc.connect(gain);
  gain.connect(AC.destination);
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol || 0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration);
}

function playNearMiss() {
  // 아슬아슬 통과 - 높은 삐 소리
  playTone(880, 'sine', 0.08, 0.15);
}

function playDodge() {
  // 장애물 통과 점수 - 짧은 띵
  playTone(440, 'triangle', 0.06, 0.08);
}

function playLevelUp() {
  // 레벨업 - 상승 멜로디
  const t = AC.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.15, 0.2, t + i * 0.08));
}

function playGameOver() {
  // 게임오버 - 하강 음
  const t = AC.currentTime;
  [400, 300, 200, 150].forEach((f, i) => playTone(f, 'sawtooth', 0.2, 0.25, t + i * 0.1));
}

function playBgBeat(time) {
  // 배경 비트 - 낮은 드럼 느낌
  if (muted) return;
  const osc = AC.createOscillator();
  const gain = AC.createGain();
  osc.connect(gain); gain.connect(AC.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
  gain.gain.setValueAtTime(0.18, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
  osc.start(time); osc.stop(time + 0.15);
}

// 배경 비트 루프
let beatInterval = null;
let beatStep = 0;
const BEAT_PATTERN = [1,0,0,1, 0,1,0,0]; // 간단한 패턴

function startBgMusic() {
  if (beatInterval) clearInterval(beatInterval);
  beatStep = 0;
  const BPM = 130;
  const interval = (60 / BPM / 2) * 1000;
  beatInterval = setInterval(() => {
    if (!gameRunning) { clearInterval(beatInterval); return; }
    if (BEAT_PATTERN[beatStep % BEAT_PATTERN.length]) {
      playBgBeat(AC.currentTime);
    }
    beatStep++;
  }, interval);
}

function stopBgMusic() {
  if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
}

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
});

// ── 캐릭터 그리기 ─────────────────────────────────
function drawPlayer(x, y, w, h, hit) {
  ctx.save();
  const cx = x + w / 2;
  const headR = w * 0.28;
  const bodyTop = y + headR * 2 + 4;
  const bodyH = h * 0.32;
  const legLen = h * 0.24;
  const armLen = w * 0.38;
  ctx.shadowColor = hit ? '#ff4444' : '#00e5ff';
  ctx.shadowBlur = 18;
  const col = hit ? '#ff4444' : '#00e5ff';
  const bodyCol = hit ? '#ff6666' : '#ffffff';
  ctx.strokeStyle = col; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 4, bodyTop + bodyH); ctx.lineTo(cx - 10, bodyTop + bodyH + legLen); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 4, bodyTop + bodyH); ctx.lineTo(cx + 10, bodyTop + bodyH + legLen); ctx.stroke();
  ctx.strokeStyle = bodyCol; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(cx, bodyTop); ctx.lineTo(cx, bodyTop + bodyH); ctx.stroke();
  ctx.strokeStyle = col; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(cx, bodyTop + bodyH * 0.3); ctx.lineTo(cx - armLen, bodyTop + bodyH * 0.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, bodyTop + bodyH * 0.3); ctx.lineTo(cx + armLen, bodyTop + bodyH * 0.7); ctx.stroke();
  ctx.fillStyle = bodyCol;
  ctx.beginPath(); ctx.arc(cx, y + headR, headR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = hit ? '#0a0a1a' : '#0d0d2b';
  ctx.beginPath();
  ctx.arc(cx - headR * 0.3, y + headR - 2, 3, 0, Math.PI * 2);
  ctx.arc(cx + headR * 0.3, y + headR - 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── 장애물 그리기 ─────────────────────────────────
function drawObstacle(ob) {
  ctx.save();
  ctx.shadowColor = ob.color; ctx.shadowBlur = 14; ctx.fillStyle = ob.color;
  if (ob.shape === 0) {
    ctx.translate(ob.x + ob.w/2, ob.y + ob.h/2);
    ctx.rotate(ob.rot);
    drawStar(0, 0, 5, ob.w/2, ob.w/4);
  } else if (ob.shape === 1) {
    const cx = ob.x + ob.w/2, cy = ob.y + ob.h/2;
    ctx.beginPath(); ctx.moveTo(cx, ob.y); ctx.lineTo(ob.x+ob.w, cy); ctx.lineTo(cx, ob.y+ob.h); ctx.lineTo(ob.x, cy); ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(ob.x+ob.w/2, ob.y+ob.h/2, ob.w/2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  let rot = (Math.PI/2)*3, step = Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot)*outerR, cy + Math.sin(rot)*outerR); rot += step;
    ctx.lineTo(cx + Math.cos(rot)*innerR, cy + Math.sin(rot)*innerR); rot += step;
  }
  ctx.lineTo(cx, cy - outerR); ctx.closePath(); ctx.fill();
}

// ── 배경 별 ───────────────────────────────────────
let bgStars = [];
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 60; i++)
    bgStars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*0.4+0.1 });
}
function drawBg() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff22';
  for (let s of bgStars) {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }
}

// ── 게임 초기화 ───────────────────────────────────
function initGame() {
  score = 0; level = 1; spawnTimer = 0;
  player = { x: W/2-20, y: H-90, w: 40, h: 70, speed: 5, hit: false, hitTimer: 0 };
  obstacles = [];
  initBgStars();
  scoreTxt.textContent = 0;
  levelTxt.textContent = 1;
}

// ── 장애물 스폰 ───────────────────────────────────
const OB_COLORS = ['#ff4d4d','#ff9f00','#ff4dff','#ffdd00','#4dffb4'];

function spawnObstacle() {
  const sz = 20 + Math.random()*22;
  obstacles.push({
    x: Math.random()*(W-sz), y: -sz, w: sz, h: sz,
    // 초반 속도 낮춤: 1.5 기본, 레벨당 0.4 증가
    speed: 1.5 + level * 0.4 + Math.random() * 1.0,
    shape: Math.floor(Math.random()*3),
    color: OB_COLORS[Math.floor(Math.random()*OB_COLORS.length)],
    rot: 0, rotSpeed: (Math.random()-0.5)*0.12,
    passed: false
  });
}

// ── 충돌 감지 ─────────────────────────────────────
function collides(a, b) {
  const margin = 6;
  return !(a.x+margin > b.x+b.w-margin || a.x+a.w-margin < b.x+margin ||
           a.y+margin > b.y+b.h-margin || a.y+a.h-margin < b.y+margin);
}

function isNear(a, b) {
  // 아슬아슬 판정: 충돌 margin 보다 넓은 범위
  const nm = 22;
  return !(a.x+nm > b.x+b.w-nm || a.x+a.w-nm < b.x+nm ||
           a.y+nm > b.y+b.h-nm || a.y+a.h-nm < b.y+nm);
}

// ── 메인 루프 ─────────────────────────────────────
let prevLevel = 1;

function gameLoop() {
  if (!gameRunning) return;
  drawBg();

  // 입력
  if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
  if (mouseX !== null) {
    const dx = mouseX - player.w/2 - player.x;
    if (Math.abs(dx) > 2) player.x += dx * 0.13;
  }
  player.x = Math.max(0, Math.min(W-player.w, player.x));

  // 점수 & 레벨
  score++;
  const displayScore = Math.floor(score / 10);
  scoreTxt.textContent = displayScore;
  // 레벨업 주기 늘림: 800프레임마다 (기존 600)
  level = Math.floor(score / 800) + 1;
  if (level !== prevLevel) {
    levelTxt.textContent = level;
    playLevelUp();
    prevLevel = level;
  }

  // 스폰 주기: 초반 넉넉하게 (100프레임), 레벨당 7씩 줄임, 최소 35
  spawnTimer++;
  const si = Math.max(35, 100 - level * 7);
  if (spawnTimer >= si) {
    spawnTimer = 0;
    spawnObstacle();
    if (level > 4) spawnObstacle();
  }

  // 장애물 업데이트
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += ob.speed;
    ob.rot += ob.rotSpeed;
    drawObstacle(ob);

    if (ob.y > H + 50) {
      obstacles.splice(i, 1);
      continue;
    }

    if (collides(player, ob)) {
      playGameOver();
      stopBgMusic();
      endGame(); return;
    }

    // 아슬아슬 통과 사운드
    if (!ob.passed && isNear(player, ob) && !collides(player, ob)) {
      playNearMiss();
    }

    // 장애물이 플레이어 아래로 지나갈 때
    if (!ob.passed && ob.y > player.y + player.h) {
      ob.passed = true;
      playDodge();
    }
  }

  // 플레이어 그리기
  if (player.hitTimer > 0) { player.hit = true; player.hitTimer--; } else { player.hit = false; }
  drawPlayer(player.x, player.y, player.w, player.h, player.hit);

  // 레벨 바
  const barW = (W-40) * Math.min((score % 800) / 800, 1);
  ctx.fillStyle = '#00e5ff33'; ctx.fillRect(20, H-12, W-40, 6);
  ctx.fillStyle = '#00e5ff'; ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 8;
  ctx.fillRect(20, H-12, barW, 6); ctx.shadowBlur = 0;

  animId = requestAnimationFrame(gameLoop);
}

// ── 게임 종료 ─────────────────────────────────────
function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  const finalScore = Math.floor(score / 10);
  if (finalScore > best) {
    best = finalScore;
    localStorage.setItem('dodge_best', best);
    bestTxt.textContent = best;
  }
  overlay.innerHTML = `
    <h2>💀 GAME OVER</h2>
    <p style="font-size:1.4rem">점수: <b style="color:#00e5ff;font-size:1.8rem">${finalScore}</b></p>
    <p>최고 기록: <b>${best}</b></p>
    <button id="startBtn">다시 하기</button>
    <div id="hint">← → 방향키 / 마우스로 조작</div>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame);
}

// ── 게임 시작 ─────────────────────────────────────
function startGame() {
  AC.resume();
  overlay.style.display = 'none';
  initGame();
  gameRunning = true;
  prevLevel = 1;
  startBgMusic();
  gameLoop();
}

// ── 입력 처리 ─────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('mouseleave', () => { mouseX = null; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseX = null; });
startBtn.addEventListener('click', startGame);

initBgStars(); drawBg();
</script>
</body>
</html>
